services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bleeppay
      POSTGRES_PASSWORD: bleeppay
      POSTGRES_DB: bleeppay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bleeppay:bleeppay@db:5432/bleeppay
      JWT_SECRET: change_me_in_production
      STRIPE_SECRET_KEY: sk_test_xxx

volumes:
  pgdata:
