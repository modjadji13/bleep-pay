name: bleep_pay
description: Tap to pay - BLE proximity payments

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP
  dio: ^5.4.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # BLE
  flutter_blue_plus: ^1.31.15

  # Secure JWT storage
  flutter_secure_storage: ^9.0.0

  # UUID generation (for BLE session token)
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
